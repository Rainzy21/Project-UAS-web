<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' https://image.tmdb.org data:; connect-src 'self' https://*.supabase.co http://localhost:8000; frame-ancestors 'none'; base-uri 'self';">
    <title>Movie Detail · SJ MovieReview</title>
    <meta name="description" content="View movie details, trailers, cast information and save to your watchlist.">
    <script src="Static/js/origin-guard.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet" integrity="sha384-nRgPTkuX86pH8yjPJUAFuASXQSSl2/bBUiNV47vSYpKFxHJhbcrGnmlYpYJMeD7a" crossorigin="anonymous">
    <link rel="stylesheet" href="Static/css/style.css">
    <link rel="stylesheet" href="Static/css/landing.css">
</head>
<body class="min-h-screen relative flex flex-col">

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-30 px-6 md:px-10 py-4">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 group">
                <div class="lp-logo-badge">SJ</div>
                <span class="text-white font-semibold tracking-wide text-sm">MovieReview</span>
            </a>
            <div class="flex items-center gap-6 text-sm">
                <a href="recommendations.html" class="lp-btn lp-btn-secondary lp-nav-rec-btn js-rec-cta text-xs px-4 py-2">
                    <i class="fa-solid fa-wand-magic-sparkles text-[11px]"></i> Get AI Picks
                </a>
                <div id="nav-guest" class="flex items-center gap-3">
                    <button id="login-trigger" class="glass-btn glass-btn-primary text-xs px-4 py-2"><i class="fa-regular fa-user text-[11px]"></i> Login</button>
                </div>
                <div id="nav-user" class="hidden flex items-center gap-4">
                    <a href="my-list.html" class="text-white/60 hover:text-white transition flex items-center gap-2"><i class="fa-regular fa-bookmark text-xs"></i> My List</a>
                    <a href="profile.html" class="text-white/60 hover:text-white transition flex items-center gap-2"><i class="fa-regular fa-user text-xs"></i> <span id="nav-user-name">User</span></a>
                    <button id="logout-btn" class="text-white/40 hover:text-red-400 transition text-xs"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <div id="verify-banner" class="hidden fixed top-[60px] left-0 right-0 z-20 px-6">
        <div class="max-w-[1400px] mx-auto verify-banner mt-2">
            <i class="fa-solid fa-envelope text-sm"></i>
            <span class="text-sm">Your email is not verified.</span>
            <button id="resend-verify-btn" class="link-accent text-xs ml-auto">Resend verification email</button>
        </div>
    </div>

    <!-- Backdrop Hero -->
    <div id="detail-backdrop" class="relative min-h-[70vh] flex items-end">
        <div id="backdrop-img" class="absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-color: #0a0a0f;"></div>
        <div class="absolute inset-0 bg-overlay-full"></div>

        <!-- Ambient glow -->
        <div class="absolute bottom-0 left-1/4 w-[400px] h-[300px] bg-red-900/10 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="relative z-10 w-full max-w-[1400px] mx-auto px-6 md:px-10 pt-28 pb-12">
            <div class="flex flex-col md:flex-row gap-8 items-start">
                <!-- Poster -->
                <div id="detail-poster-wrap" class="w-44 md:w-52 flex-shrink-0 rounded-xl overflow-hidden shadow-2xl border border-white/10 hidden" style="box-shadow: 0 8px 40px rgba(229,0,0,0.2);">
                    <img id="detail-poster" src="" alt="" class="w-full h-full object-cover" style="aspect-ratio:2/3;">
                </div>

                <!-- Info -->
                <div class="flex-1 min-w-0">
                    <div id="detail-genres" class="flex flex-wrap gap-2 mb-3"></div>
                    <h1 id="detail-title" class="text-4xl md:text-5xl font-heading font-bold mb-4 leading-tight">Loading...</h1>
                    <div id="detail-meta" class="flex flex-wrap items-center gap-4 text-sm text-white/50 mb-6"></div>
                    <p id="detail-overview" class="text-white/50 text-sm leading-relaxed max-w-2xl mb-8"></p>
                    <div class="flex items-center gap-4">
                        <button id="detail-save-btn" class="lp-btn lp-btn-primary py-3 px-6 text-sm">
                            <i class="fa-solid fa-plus"></i> Save to My List
                        </button>
                        <a id="detail-trailer-btn" href="#" target="_blank" class="lp-btn lp-btn-secondary py-3 px-6 text-sm hidden">
                            <i class="fa-solid fa-play"></i> Watch Trailer
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Cast & Info Section -->
    <main class="max-w-[1400px] mx-auto w-full px-6 md:px-10 py-12 relative z-10">
        <!-- Cast -->
        <div id="detail-cast-section" class="hidden mb-12">
            <div class="flex items-center gap-3 mb-6">
                <div class="section-accent-bar"></div>
                <h2 class="text-xl font-heading font-semibold uppercase tracking-wide">Cast</h2>
            </div>
            <div id="detail-cast" class="flex gap-4 overflow-x-auto no-scrollbar pb-4"></div>
        </div>

        <!-- Details Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div id="detail-info-card" class="glass p-6 rounded-xl hidden">
                <h3 class="text-sm font-semibold uppercase tracking-wider text-white/40 mb-4">Movie Info</h3>
                <div id="detail-info-list" class="space-y-3 text-sm"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full border-t border-white/5 mt-auto relative z-10" style="background: rgba(5,5,7,0.8); backdrop-filter: blur(20px);">
        <div class="max-w-[1400px] mx-auto px-8 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <nav class="flex items-center gap-8 text-sm">
                <a href="privacy.html" class="text-white/30 hover:text-white/60 transition">Privacy Policy</a>
                <a href="#" class="text-white/30 hover:text-white/60 transition">Terms of Service</a>
            </nav>
            <p class="text-white/20 text-xs tracking-wide">&copy; 2026 SJ MovieReview.</p>
        </div>
    </footer>

    <!-- Supabase JS client (must load FIRST) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
    <script src="Static/js/config.js"></script>
    <script src="Static/js/utils.js"></script>
    <script src="Static/js/toast.js"></script>
    <script src="Static/js/api.js"></script>
    <script src="Static/js/auth.js"></script>
    <script src="Static/js/nav.js"></script>

    <script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const tmdbId = params.get('id');
        if (!tmdbId) {
            document.getElementById('detail-title').textContent = 'Movie not found';
            return;
        }

        try {
            const movie = await window.Api.get(`/api/movies/${encodeURIComponent(tmdbId)}/full`);
            const U = window.AppUtils;

            document.getElementById('detail-title').textContent = movie.title;
            document.title = `${movie.title} · SJ MovieReview`;

            if (movie.backdrop_url && U.safePosterUrl(movie.backdrop_url.replace('/t/p/original', '/t/p/w1280'))) {
                document.getElementById('backdrop-img').style.backgroundImage =
                    `url(${U.safePosterUrl(movie.backdrop_url) || movie.backdrop_url})`;
            } else if (movie.backdrop_url) {
                try {
                    const u = new URL(movie.backdrop_url);
                    if (u.hostname.endsWith('image.tmdb.org')) {
                        document.getElementById('backdrop-img').style.backgroundImage = `url(${u.href})`;
                    }
                } catch (_) {}
            }

            const posterSrc = U.safePosterUrl(movie.poster_url);
            if (posterSrc) {
                const posterWrap = document.getElementById('detail-poster-wrap');
                posterWrap.classList.remove('hidden');
                const posterImg = document.getElementById('detail-poster');
                posterImg.src = posterSrc;
                posterImg.alt = movie.title || '';
            }

            const genresEl = document.getElementById('detail-genres');
            (movie.genres || []).forEach(g => {
                const pill = document.createElement('span');
                pill.className = 'glass-pill text-xs';
                pill.textContent = g.name || g;
                genresEl.appendChild(pill);
            });

            const metaEl = document.getElementById('detail-meta');
            metaEl.innerHTML = '';
            const ratingWrap = document.createElement('div');
            ratingWrap.className = 'flex items-center gap-2';
            ratingWrap.innerHTML = '<i class="fa-solid fa-star" style="color: var(--lp-red);"></i>';
            const ratingSpan = document.createElement('span');
            ratingSpan.className = 'font-bold text-white text-base';
            ratingSpan.textContent = Number(movie.rating || 0).toFixed(1);
            ratingWrap.appendChild(ratingSpan);
            const tenSpan = document.createElement('span');
            tenSpan.className = 'text-xs';
            tenSpan.textContent = '/10';
            ratingWrap.appendChild(tenSpan);
            metaEl.appendChild(ratingWrap);
            if (movie.year) {
                const yearSpan = document.createElement('span');
                yearSpan.textContent = String(movie.year);
                metaEl.appendChild(yearSpan);
            }
            if (movie.runtime) {
                const rtSpan = document.createElement('span');
                rtSpan.textContent = `${Math.floor(movie.runtime / 60)}h ${movie.runtime % 60}m`;
                metaEl.appendChild(rtSpan);
            }
            if (movie.language) {
                const langSpan = document.createElement('span');
                langSpan.className = 'glass-pill text-[10px] uppercase';
                langSpan.textContent = movie.language;
                metaEl.appendChild(langSpan);
            }

            document.getElementById('detail-overview').textContent = movie.overview || '';

            if (movie.videos && movie.videos.results) {
                const trailer = movie.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer && trailer.key) {
                    const trailerBtn = document.getElementById('detail-trailer-btn');
                    trailerBtn.href = `https://www.youtube.com/watch?v=${encodeURIComponent(trailer.key)}`;
                    trailerBtn.classList.remove('hidden');
                }
            }

            if (movie.credits && movie.credits.cast && movie.credits.cast.length > 0) {
                const castSection = document.getElementById('detail-cast-section');
                castSection.classList.remove('hidden');
                const castEl = document.getElementById('detail-cast');
                movie.credits.cast.slice(0, 10).forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'flex-shrink-0 w-24 text-center';

                    const avatar = document.createElement('div');
                    avatar.className = 'w-20 h-20 rounded-full mx-auto mb-2 overflow-hidden bg-white/5 border border-white/10';
                    const profilePath = c.profile_path
                        ? `https://image.tmdb.org/t/p/w185${c.profile_path}`
                        : '';
                    const profileSrc = U.safePosterUrl(profilePath);
                    if (profileSrc) {
                        const img = document.createElement('img');
                        img.src = profileSrc;
                        img.alt = c.name || '';
                        img.className = 'w-full h-full object-cover';
                        avatar.appendChild(img);
                    } else {
                        avatar.innerHTML = '<div class="w-full h-full flex items-center justify-center text-white/20"><i class="fa-solid fa-user"></i></div>';
                    }
                    card.appendChild(avatar);

                    const nameP = document.createElement('p');
                    nameP.className = 'text-xs font-medium truncate text-white/70';
                    nameP.textContent = c.name || '';
                    card.appendChild(nameP);

                    const charP = document.createElement('p');
                    charP.className = 'text-[10px] text-white/30 truncate';
                    charP.textContent = c.character || '';
                    card.appendChild(charP);

                    castEl.appendChild(card);
                });
            }

            const infoCard = document.getElementById('detail-info-card');
            infoCard.classList.remove('hidden');
            const infoList = document.getElementById('detail-info-list');
            const infos = [
                { label: 'Status', value: movie.status },
                { label: 'Budget', value: movie.budget ? `$${(movie.budget / 1_000_000).toFixed(1)}M` : null },
                { label: 'Revenue', value: movie.revenue ? `$${(movie.revenue / 1_000_000).toFixed(1)}M` : null },
                { label: 'Language', value: movie.spoken_languages ? movie.spoken_languages.map(l => l.english_name).join(', ') : null },
                { label: 'Production', value: movie.production_companies ? movie.production_companies.map(p => p.name).slice(0, 3).join(', ') : null },
            ].filter(i => i.value);

            infos.forEach(info => {
                const row = document.createElement('div');
                row.className = 'flex justify-between';
                const label = document.createElement('span');
                label.className = 'text-white/40';
                label.textContent = info.label;
                const val = document.createElement('span');
                val.className = 'text-white/70 text-right';
                val.textContent = info.value;
                row.appendChild(label);
                row.appendChild(val);
                infoList.appendChild(row);
            });

            const saveBtn = document.getElementById('detail-save-btn');
            saveBtn.addEventListener('click', async () => {
                const session = window.Auth ? await window.Auth.getSession() : null;
                if (!session) { if (window.Auth) window.Auth.showModal('login'); return; }
                try {
                    saveBtn.disabled = true;
                    saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving\u2026';
                    const sb = window.Auth.getClient();
                    const posterUrl = movie.poster_url || '';
                    const yr = movie.year ? parseInt(movie.year, 10) : null;

                    const { error: rpcErr } = await sb.rpc('save_movie_to_wishlist', {
                        p_tmdb_id: Number(tmdbId), p_title: movie.title,
                        p_poster_url: posterUrl, p_rating: movie.rating || 0, p_year: yr,
                    });

                    if (rpcErr) throw rpcErr;

                    saveBtn.innerHTML = '<i class="fa-solid fa-check"></i> Saved!';
                    saveBtn.style.background = 'rgba(229,0,0,0.25)';
                    saveBtn.style.borderColor = 'rgba(229,0,0,0.5)';
                    if (window.showToast) window.showToast('\u201c' + movie.title + '\u201d saved to My List!', 'success');
                } catch (e) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Save to My List';
                    if (window.showToast) window.showToast('Failed: ' + e.message, 'error');
                }
            });

        } catch (err) {
            document.getElementById('detail-title').textContent = 'Movie not found';
            document.getElementById('detail-overview').textContent = 'Unable to load movie details. Please try again.';
        }
    })();
    </script>
</body>
</html>
