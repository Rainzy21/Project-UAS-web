    <script>
    (async function() {
        const params = new URLSearchParams(window.location.search);
        const tmdbId = params.get('id');
        if (!tmdbId) {
            document.getElementById('detail-title').textContent = 'Movie not found';
            return;
        }

        try {
            const movie = await window.AppAPI.fetchMovieDetail(tmdbId);

            // Title
            document.getElementById('detail-title').textContent = movie.title;
            document.title = `${movie.title} · SJ MovieReview`;

            // Backdrop
            if (movie.backdrop_path) {
                document.getElementById('backdrop-img').style.backgroundImage =
                    `url(${window.AppAPI.backdropUrl(movie.backdrop_path)})`;
            }

            // Poster
            if (movie.poster_path) {
                const posterWrap = document.getElementById('detail-poster-wrap');
                posterWrap.classList.remove('hidden');
                const posterImg = document.getElementById('detail-poster');
                posterImg.src = window.AppAPI.posterUrl(movie.poster_path);
                posterImg.alt = movie.title;
            }

            // Genres
            const genresEl = document.getElementById('detail-genres');
            (movie.genres || []).forEach(g => {
                const pill = document.createElement('span');
                pill.className = 'glass-pill text-xs';
                pill.textContent = g.name;
                genresEl.appendChild(pill);
            });

            // Meta
            const metaEl = document.getElementById('detail-meta');
            const rating = (movie.vote_average || 0).toFixed(1);
            const year = (movie.release_date || '').slice(0, 4);
            const runtime = movie.runtime ? `${Math.floor(movie.runtime / 60)}h ${movie.runtime % 60}m` : '';

            metaEl.innerHTML = `
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-star" style="color: var(--lp-red);"></i>
                    <span class="font-bold text-white text-base">${rating}</span><span class="text-xs">/10</span>
                </div>
                ${year ? `<span>${year}</span>` : ''}
                ${runtime ? `<span>${runtime}</span>` : ''}
                ${movie.original_language ? `<span class="glass-pill text-[10px] uppercase">${movie.original_language}</span>` : ''}
            `;

            // Overview
            document.getElementById('detail-overview').textContent = movie.overview || '';

            // Trailer
            if (movie.videos && movie.videos.results) {
                const trailer = movie.videos.results.find(v => v.type === 'Trailer' && v.site === 'YouTube');
                if (trailer) {
                    const trailerBtn = document.getElementById('detail-trailer-btn');
                    trailerBtn.href = `https://www.youtube.com/watch?v=${trailer.key}`;
                    trailerBtn.classList.remove('hidden');
                }
            }

            // Cast
            if (movie.credits && movie.credits.cast && movie.credits.cast.length > 0) {
                const castSection = document.getElementById('detail-cast-section');
                castSection.classList.remove('hidden');
                const castEl = document.getElementById('detail-cast');
                movie.credits.cast.slice(0, 10).forEach(c => {
                    const card = document.createElement('div');
                    card.className = 'flex-shrink-0 w-24 text-center';
                    const imgSrc = c.profile_path
                        ? `https://image.tmdb.org/t/p/w185${c.profile_path}`
                        : '';
                    card.innerHTML = `
                        <div class="w-20 h-20 rounded-full mx-auto mb-2 overflow-hidden bg-white/5 border border-white/10">
                            ${imgSrc ? `<img src="${imgSrc}" alt="${c.name}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-white/20"><i class="fa-solid fa-user"></i></div>'}
                        </div>
                        <p class="text-xs font-medium truncate text-white/70">${c.name}</p>
                        <p class="text-[10px] text-white/30 truncate">${c.character || ''}</p>
                    `;
                    castEl.appendChild(card);
                });
            }

            // Info card
            const infoCard = document.getElementById('detail-info-card');
            infoCard.classList.remove('hidden');
            const infoList = document.getElementById('detail-info-list');
            const infos = [
                { label: 'Status', value: movie.status },
                { label: 'Budget', value: movie.budget ? `$${(movie.budget / 1_000_000).toFixed(1)}M` : null },
                { label: 'Revenue', value: movie.revenue ? `$${(movie.revenue / 1_000_000).toFixed(1)}M` : null },
                { label: 'Language', value: movie.spoken_languages ? movie.spoken_languages.map(l => l.english_name).join(', ') : null },
                { label: 'Production', value: movie.production_companies ? movie.production_companies.map(p => p.name).slice(0, 3).join(', ') : null },
            ].filter(i => i.value);

            infos.forEach(info => {
                const row = document.createElement('div');
                row.className = 'flex justify-between';
                row.innerHTML = `<span class="text-white/40">${info.label}</span><span class="text-white/70 text-right">${info.value}</span>`;
                infoList.appendChild(row);
            });

            // Save button — RPC (preferred) or direct insert (fallback)
            const saveBtn = document.getElementById('detail-save-btn');
            saveBtn.addEventListener('click', async () => {
                const session = window.Auth ? await window.Auth.getSession() : null;
                if (!session) { if (window.Auth) window.Auth.showModal('login'); return; }
                try {
                    saveBtn.disabled = true;
                    saveBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving\u2026';
                    const sb = window.Auth.getClient();
                    const posterUrl = movie.poster_path ? `https://image.tmdb.org/t/p/w500${movie.poster_path}` : '';
                    const yrStr = (movie.release_date || '').slice(0, 4);
                    const yr = yrStr ? parseInt(yrStr, 10) : null;

                    // Try RPC first
                    const { error: rpcErr } = await sb.rpc('save_movie_to_wishlist', {
                        p_tmdb_id: Number(tmdbId), p_title: movie.title,
                        p_poster_url: posterUrl, p_rating: movie.vote_average || 0, p_year: yr,
                    });

                    if (rpcErr) {
                        if (rpcErr.code === 'PGRST202' || rpcErr.message.includes('Could not find')) {
                            // Fallback: direct upsert + insert
                            const { error: upsertErr } = await sb.from('movies').upsert(
                                { tmdb_id: Number(tmdbId), title: movie.title, poster_url: posterUrl, rating: movie.vote_average || 0, year: yr },
                                { onConflict: 'tmdb_id', ignoreDuplicates: true }
                            ); 
                            
                            if (upsertErr) {
                                console.error("Movies upsert error:", upsertErr);
                                throw new Error("Could not insert movie into database. Please run supabase_fix_wishlist.sql in your Supabase SQL editor to enable RLS or create the RPC function.");
                            }
                            
                            const { error: ins } = await sb.from('saved_movies')
                                .insert({ tmdb_id: Number(tmdbId), user_id: session.user.id });
                            if (ins && ins.code !== '23505') throw ins;
                        } else { throw rpcErr; }
                    }

                    saveBtn.innerHTML = '<i class="fa-solid fa-check"></i> Saved!';
                    saveBtn.style.background = 'rgba(229,0,0,0.25)';
                    saveBtn.style.borderColor = 'rgba(229,0,0,0.5)';
                    if (window.showToast) window.showToast('\u201c' + movie.title + '\u201d saved to My List!', 'success');
                } catch (e) {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Save to My List';
                    if (window.showToast) window.showToast('Failed: ' + e.message, 'error');
                }
            });



        } catch (err) {
            console.error('Failed to load movie detail', err);
            document.getElementById('detail-title').textContent = 'Movie not found';
            document.getElementById('detail-overview').textContent = 'Unable to load movie details. Please try again.';
        }
    })();
    </script>
