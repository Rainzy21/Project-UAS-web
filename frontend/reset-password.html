<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self'; img-src 'self' data:; connect-src 'self' https://*.supabase.co; frame-ancestors 'none'; base-uri 'self';">
    <title>Reset Password · SJ MovieReview</title>
    <script src="Static/js/origin-guard.js"></script>
    <link rel="stylesheet" href="Static/libs/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="Static/css/style.css">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }
        .reset-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
    </style>
</head>
<body>
    <div class="reset-page">
        <div class="glass reset-card" id="reset-card">
            <div class="auth-modal-brand mb-6">
                <div class="auth-modal-logo">SJ</div>
            </div>
            <h1 class="auth-modal-title mb-2">Set new password</h1>
            <p class="auth-modal-subtitle mb-6" id="reset-subtitle">Choose a new password for your account.</p>
            <p id="reset-error" class="auth-form-error hidden mb-4" role="alert"></p>
            <form id="reset-form" class="auth-form hidden">
                <div class="auth-field">
                    <label for="reset-password">New password</label>
                    <input id="reset-password" type="password" class="glass-input" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8" maxlength="128">
                </div>
                <div class="auth-field">
                    <label for="reset-confirm">Confirm password</label>
                    <input id="reset-confirm" type="password" class="glass-input" placeholder="Repeat password" autocomplete="new-password" required minlength="8" maxlength="128">
                </div>
                <button type="submit" class="auth-submit-btn">Update password</button>
            </form>
            <p id="reset-loading" class="text-sm text-white/40 text-center">Verifying reset link…</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
    <script src="Static/js/config.js"></script>
    <script src="Static/js/utils.js"></script>
    <script src="Static/js/toast.js"></script>
    <script src="Static/js/auth.js"></script>
    <script>
        (async function () {
            const form = document.getElementById('reset-form');
            const loading = document.getElementById('reset-loading');
            const errorEl = document.getElementById('reset-error');
            const subtitle = document.getElementById('reset-subtitle');

            function showError(msg) {
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
            }

            const sb = window.Auth && window.Auth.getClient();
            if (!sb) {
                loading.classList.add('hidden');
                showError('Auth is not configured.');
                return;
            }

            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));
            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const type = hashParams.get('type');

            if (!accessToken || !refreshToken || type !== 'recovery') {
                loading.classList.add('hidden');
                showError('Invalid or expired reset link. Request a new one from the sign-in page.');
                return;
            }

            const { error: sessionError } = await sb.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken,
            });

            loading.classList.add('hidden');

            if (sessionError) {
                showError(sessionError.message);
                return;
            }

            form.classList.remove('hidden');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorEl.classList.add('hidden');
                const password = document.getElementById('reset-password').value;
                const confirm = document.getElementById('reset-confirm').value;
                const btn = form.querySelector('[type="submit"]');

                if (password !== confirm) {
                    showError('Passwords do not match.');
                    return;
                }
                if (password.length < 8) {
                    showError('Password must be at least 8 characters.');
                    return;
                }

                if (btn) btn.disabled = true;

                const { error } = await sb.auth.updateUser({ password });
                if (error) {
                    showError(error.message);
                    if (btn) btn.disabled = false;
                    return;
                }

                try {
                    await sb.auth.signOut({ scope: 'others' });
                } catch (_) {
                    /* non-fatal: other sessions may already be invalid */
                }

                history.replaceState(null, '', location.pathname + location.search);
                subtitle.textContent = 'Password updated! Redirecting…';
                form.classList.add('hidden');
                if (window.showToast) window.showToast('Password updated successfully', 'success');
                setTimeout(() => { window.location.href = '/'; }, 1500);
            });
        })();
    </script>
</body>
</html>
