<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net; base-uri 'self';">
    <title>Signing in… · SJ MovieReview</title>
    <script src="Static/js/origin-guard.js"></script>
    <link rel="stylesheet" href="Static/libs/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="Static/css/style.css">
    <style>
        .auth-callback-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .auth-callback-card {
            text-align: center;
            padding: 2.5rem 2rem;
            max-width: 360px;
        }
        .auth-callback-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1.25rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="auth-callback-page">
        <div class="glass auth-callback-card">
            <div class="auth-callback-spinner" id="spinner"></div>
            <p class="text-white font-medium mb-1" id="callback-title">Signing you in…</p>
            <p class="text-sm text-white/40" id="callback-msg">Just a moment.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" integrity="sha384-JWEyvHh+lRf0sN/WWY+QTQwX+CyWqmNg4tkc8GQzAMEtR2wGNrCJlvnu1lHD1kDm" crossorigin="anonymous"></script>
    <script src="Static/js/config.js"></script>
    <script src="Static/js/utils.js"></script>
    <script src="Static/js/auth.js"></script>
    <script src="Static/js/auth-callback.js"></script>
</body>
</html>
