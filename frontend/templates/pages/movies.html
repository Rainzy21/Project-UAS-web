{% extends 'base/base.html' %}

{% block content %}
<main class="max-w-[1400px] mx-auto w-full px-8 py-24 flex flex-col min-h-screen relative z-10">
    <div class="mb-8 mt-10">
        <h1 class="text-4xl font-bold mb-2 tracking-wide">All Movies</h1>
        <p class="text-gray-400 text-sm">Browse our complete collection of titles.</p>
    </div>

    <div class="flex gap-3 mb-8 pb-6 border-b border-gray-800/50 overflow-x-auto no-scrollbar">
        <button class="bg-white text-black px-6 py-2 rounded-full text-sm font-medium whitespace-nowrap">All Genres</button>
        <button class="bg-[#1a1a1a] text-gray-300 hover:text-white px-6 py-2 rounded-full text-sm font-medium whitespace-nowrap transition">Action</button>
        <button class="bg-[#1a1a1a] text-gray-300 hover:text-white px-6 py-2 rounded-full text-sm font-medium whitespace-nowrap transition">Sci-Fi</button>
    </div>

    {% include 'partials/movie_list.html' %}

    <div class="flex justify-center w-full mt-10 mb-16">
        <button id="load-more-btn" class="border border-[#ffc107] text-[#ffc107] px-8 py-3 rounded text-sm font-bold uppercase tracking-widest hover:bg-[#ffc107] hover:text-black transition duration-300">
            Load More
        </button>
    </div>
</main>
{% endblock %}
