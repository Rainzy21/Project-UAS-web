<div id="signup-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-[#1c1d1f] w-full max-w-[420px] rounded-lg shadow-2xl relative border border-gray-800">
        <button onclick="toggleSignupModal(false)" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
        <div class="p-8">
            <div class="flex justify-center mb-6">
                <div class="bg-[#ffc107] text-black font-bold text-2xl rounded-md px-3 py-1 shadow-[0_0_15px_rgba(255,193,7,0.15)]">SJ</div>
            </div>

            <!-- Signup Form -->
            <div>
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-bold text-white mb-1">Create Account</h2>
                    <p class="text-sm text-gray-400">Join SJ MovieReview</p>
                </div>
                <form id="signup-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase mb-2">Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-user text-gray-500 text-sm"></i></div>
                            <input id="signup-name" type="text" name="signup_username" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase mb-2">Email</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-envelope text-gray-500 text-sm"></i></div>
                            <input id="signup-email" type="email" name="signup_email" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase mb-2">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-gray-500 text-sm"></i></div>
                            <input id="signup-password" type="password" name="signup_password" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="Create a password" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase mb-2">Confirm Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-gray-500 text-sm"></i></div>
                            <input type="password" name="signup_confirm" id="signup_confirm" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="Repeat your password" required>
                        </div>
                        <p id="password-mismatch" class="hidden text-xs text-red-400 mt-1">Passwords do not match.</p>
                    </div>
                    <p id="signup-error" class="text-xs text-red-400 min-h-[1rem]"></p>
                    <button type="submit" class="w-full text-black bg-[#d49a00] hover:bg-[#ffc107] font-bold rounded text-sm px-5 py-3 mt-2">Create Account</button>
                </form>
                <div class="border-t border-gray-800/60 mt-6 mb-4"></div>
                <p class="text-center text-sm text-gray-400">Already have an account? <button type="button" onclick="switchToLogin()" class="text-white font-semibold hover:underline">Login</button></p>
            </div>
        </div>
    </div>
</div>
