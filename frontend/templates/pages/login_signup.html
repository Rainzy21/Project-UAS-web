<div id="auth-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-[#1c1d1f] w-full max-w-[420px] rounded-lg shadow-2xl relative border border-gray-800">
        <button id="close-modal" class="absolute top-4 right-4 text-gray-500 hover:text-white transition">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
        <div class="p-8">
            <div class="flex justify-center mb-6">
                <div class="bg-[#ffc107] text-black font-bold text-2xl rounded-md px-3 py-1 shadow-[0_0_15px_rgba(255,193,7,0.15)]">MDb</div>
            </div>
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-white mb-1">Welcome Back</h2>
                <p class="text-sm text-gray-400" id="modal-context">Please login to continue.</p>
            </div>
            <form action="#" method="POST" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase mb-2">Username or Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-regular fa-user text-gray-500 text-sm"></i></div>
                        <input type="text" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="Enter your username" required>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-[11px] font-medium text-gray-400 tracking-wider uppercase">Password</label>
                        <a href="#" class="text-[11px] text-[#ffc107] hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i class="fa-solid fa-lock text-gray-500 text-sm"></i></div>
                        <input type="password" class="w-full bg-[#121212] border border-gray-700 text-white text-sm rounded focus:ring-1 focus:ring-[#ffc107] block pl-10 p-2.5 outline-none" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="w-full text-black bg-[#d49a00] hover:bg-[#ffc107] font-bold rounded text-sm px-5 py-3 mt-2">Login to MDb</button>
            </form>
            <div class="border-t border-gray-800/60 mt-8 mb-6"></div>
            <p class="text-center text-sm text-gray-400">New to MDb? <a href="#" class="text-white font-semibold hover:underline">Create an account</a></p>
        </div>
    </div>
</div>
